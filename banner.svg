<svg fill="none" width="100%" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark Cyber Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d14" />
      <stop offset="50%" stop-color="#101524" />
      <stop offset="100%" stop-color="#07090e" />
    </linearGradient>

    <!-- Cyan-Purple Linear Gradient -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#7000ff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg-grad)" rx="12" />

  <!-- Animated Grid Circuit Lines (Using Native SVG Animations) -->
  <g opacity="0.3">
    <path d="M 0 60 L 300 60 L 400 150 L 700 150 L 800 60 L 1200 60" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="12 12">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M 0 240 L 200 240 L 350 130 L 850 130 L 1000 240 L 1200 240" stroke="url(#line-grad)" stroke-width="2" stroke-dasharray="8 8">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="6s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Glowing Nodes with Native Pulse Animation -->
  <g transform="translate(880, 70)">
    <!-- Central AI Brain Core -->
    <circle cx="90" cy="80" r="45" fill="#7000ff" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite" />
      <animate attributeName="r" values="40;48;40" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="90" cy="80" r="30" stroke="#00f0ff" stroke-width="2" fill="none" />
    <text x="90" y="85" text-anchor="middle" fill="#00f0ff" font-family="sans-serif" font-weight="bold" font-size="12"></text>

    <!-- Floating Connected Nodes -->
    <path d="M 90 50 L 90 20 M 90 110 L 90 140 M 60 80 L 20 80 M 120 80 L 160 80" stroke="#00f0ff" stroke-width="2" stroke-dasharray="4" />
    
    <circle cx="90" cy="20" r="7" fill="#00f0ff" />
    <circle cx="90" cy="140" r="7" fill="#ff007f" />
    <circle cx="20" cy="80" r="7" fill="#7000ff" />
    <circle cx="160" cy="80" r="7" fill="#00f0ff" />
  </g>

  <!-- Main Profile Text -->
  <g transform="translate(70, 105)">
    <text x="0" y="0" fill="#ffffff" font-family="sans-serif" font-weight="800" font-size="40">KANISHK AGRAWAL</text>
    <text x="0" y="36" fill="#00f0ff" font-family="sans-serif" font-weight="600" font-size="18">Full Stack Developer | AI Enthusiast | AWS Cloud Practitioner</text>
    <text x="0" y="68" fill="#8b949e" font-family="sans-serif" font-size="14">⚡ Building Intelligent, Scalable &amp; Cloud-Native Web Applications</text>

    <!-- Dynamic Status Badge inside SVG -->
    <g transform="translate(0, 92)">
      <rect width="180" height="28" rx="14" fill="#161b22" stroke="#30363d" />
      <circle cx="16" cy="14" r="5" fill="#2ea44f">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
      </circle>
      <text x="30" y="18" fill="#c9d1d9" font-family="sans-serif" font-size="11" font-weight="600">Available for Projects</text>
    </g>
  </g>
</svg>
