<svg fill="none" width="100%" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0d1117; }
    .title { font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 800; font-size: 42px; fill: #ffffff; }
    .subtitle { font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 600; font-size: 18px; fill: #00f0ff; }
    .tagline { font-family: 'Segoe UI', Ubuntu, sans-serif; font-size: 14px; fill: #8b949e; }
    
    /* Animation Pulse for Circuits */
    @keyframes pulse {
      0% { stroke-dashoffset: 1000; opacity: 0.2; }
      50% { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0.2; }
    }
    
    /* Animation Glow for Brain & Nodes */
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 2px #00f0ff); opacity: 0.6; }
      50% { filter: drop-shadow(0 0 10px #7000ff); opacity: 1; }
    }

    /* Floating Animation */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .circuit-line {
      stroke: url(#cyan-purple-grad);
      stroke-width: 2;
      stroke-dasharray: 10 15;
      animation: pulse 8s linear infinite;
    }

    .glowing-node {
      animation: glow 3s ease-in-out infinite;
    }

    .floating-group {
      animation: float 4s ease-in-out infinite;
    }
  </style>

  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d14" />
      <stop offset="50%" stop-color="#101524" />
      <stop offset="100%" stop-color="#07090e" />
    </linearGradient>

    <!-- Glowing Lines Gradient -->
    <linearGradient id="cyan-purple-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#7000ff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="300" fill="url(#bg-grad)" rx="12" />

  <!-- Animated Circuit & Grid Overlay -->
  <g opacity="0.4">
    <path class="circuit-line" d="M 0 50 L 300 50 L 400 150 L 700 150 L 800 50 L 1200 50" fill="none" />
    <path class="circuit-line" d="M 0 250 L 200 250 L 350 120 L 850 120 L 1000 250 L 1200 250" fill="none" />
    <path class="circuit-line" d="M 150 0 L 150 300 M 1050 0 L 1050 300" fill="none" />
  </g>

  <!-- Animated Floating AI & Cloud Graphics (Right Side) -->
  <g class="floating-group" transform="translate(850, 60)">
    <!-- Central Brain/AI Engine Node -->
    <circle cx="100" cy="90" r="50" fill="#7000ff" opacity="0.15" class="glowing-node" />
    <circle cx="100" cy="90" r="35" stroke="#00f0ff" stroke-width="2" fill="none" class="glowing-node" />
    
    <!-- Outer Connected Nodes -->
    <path d="M 100 55 L 100 20 M 100 125 L 100 160 M 65 90 L 20 90 M 135 90 L 180 90" stroke="#00f0ff" stroke-width="2" stroke-dasharray="4" />
    
    <circle cx="100" cy="20" r="8" fill="#00f0ff" class="glowing-node" />
    <circle cx="100" cy="160" r="8" fill="#ff007f" class="glowing-node" />
    <circle cx="20" cy="90" r="8" fill="#7000ff" class="glowing-node" />
    <circle cx="180" cy="90" r="8" fill="#00f0ff" class="glowing-node" />

    <!-- Tech Icons / Labels -->
    <text x="100" y="95" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="12">AI CORE</text>
    <text x="180" y="115" fill="#8b949e" font-family="sans-serif" font-size="10">AWS Cloud</text>
    <text x="-25" y="115" fill="#8b949e" font-family="sans-serif" font-size="10">Full Stack</text>
  </g>

  <!-- Text Header Info (Left Side) -->
  <g transform="translate(80, 110)">
    <text x="0" y="0" class="title">KANISHK AGRAWAL</text>
    <text x="0" y="38" class="subtitle">Full Stack Developer | AI Enthusiast | AWS Cloud Practitioner</text>
    <text x="0" y="70" class="tagline">⚡ Building Intelligent, Scalable &amp; Cloud-Native Web Applications</text>

    <!-- Status Badge inside Banner -->
    <g transform="translate(0, 95)">
      <rect width="180" height="28" rx="14" fill="#161b22" stroke="#30363d" />
      <circle cx="15" cy="14" r="5" fill="#2ea44f" class="glowing-node" />
      <text x="28" y="18" fill="#c9d1d9" font-family="sans-serif" font-size="11" font-weight="600">Available for Projects</text>
    </g>
  </g>
</svg>
